services:
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      APP_ENV: local
      AUTH_HOST: 0.0.0.0
      AUTH_PORT: 8081
      RUST_LOG: info,hush_auth=debug
      DATABASE_URL: postgres://hush:hush_local_password@postgres:5432/hush
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy


  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      APP_ENV: local
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8080
      RUST_LOG: info,hush_gateway=debug,tower_http=debug
      DATABASE_URL: postgres://hush:hush_local_password@postgres:5432/hush
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hush
      POSTGRES_USER: hush
      POSTGRES_PASSWORD: hush_local_password
    ports:
      - "5432:5432"
    volumes:
      - hush_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hush -d hush"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-m", "8222"]

volumes:
  hush_postgres_data:
