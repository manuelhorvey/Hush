name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get
        working-directory: apps/mobile

      - name: Analyze
        run: flutter analyze
        working-directory: apps/mobile

      - name: Test
        run: flutter test
        working-directory: apps/mobile

  infra:
    name: Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Verify docs
        run: |
          test -f README.md
          test -f docs/architecture/system-overview.md
          test -f docs/architecture/backend-architecture.md
          test -f docs/architecture/security-model.md
          test -f docs/architecture/data-flow.md
          test -f docs/architecture/deployment.md
          test -f docs/security/security-baseline.md
          test -f docs/decisions/0001-final-technology-stack.md
          test -f docs/product/figma-foundation.md
          test -f docs/product/sprint-1-definition.md
